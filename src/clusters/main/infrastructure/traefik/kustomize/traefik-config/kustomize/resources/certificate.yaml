# Create certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: certificate
spec:
  # Include the following DNS names in the Subject Alt Name field
  dnsNames:
    - "k8s.radioaktywne.pl"
    - "*.k8s.radioaktywne.pl"
    - "*.flux.k8s.radioaktywne.pl"
    - "*.headlamp.k8s.radioaktywne.pl"
    - "*.longhorn.k8s.radioaktywne.pl"
    - "*.amber.k8s.radioaktywne.pl"
    - "*.diamond.k8s.radioaktywne.pl"
    - "*.emerald.k8s.radioaktywne.pl"
    - "*.graphite.k8s.radioaktywne.pl"
    - "*.howlite.k8s.radioaktywne.pl"
    - "*.minium.k8s.radioaktywne.pl"
    - "*.obsidian.k8s.radioaktywne.pl"
    - "*.sapphire.k8s.radioaktywne.pl"
    - "*.beaver.k8s.radioaktywne.pl"
    - "*.dingo.k8s.radioaktywne.pl"
    - "*.falcon.k8s.radioaktywne.pl"
    - "*.gecko.k8s.radioaktywne.pl"
    - "*.loris.k8s.radioaktywne.pl"
    - "*.mantis.k8s.radioaktywne.pl"
    - "*.numbat.k8s.radioaktywne.pl"
    - "*.octopus.k8s.radioaktywne.pl"
    - "*.pelican.k8s.radioaktywne.pl"
    - "*.quokka.k8s.radioaktywne.pl"
    - "*.scorpion.k8s.radioaktywne.pl"
    - "*.aster.k8s.radioaktywne.pl"
    - "*.crocus.k8s.radioaktywne.pl"
    - "*.daisy.k8s.radioaktywne.pl"
    - "*.jasmine.k8s.radioaktywne.pl"
    - "*.lotus.k8s.radioaktywne.pl"
    - "*.magnolia.k8s.radioaktywne.pl"
    - "*.orchid.k8s.radioaktywne.pl"
    - "*.podinfo.k8s.radioaktywne.pl"
    - "*.poppy.k8s.radioaktywne.pl"
    - "*.tulip.k8s.radioaktywne.pl"
  # Use Certificate Authority to issue the certificate
  issuerRef:
    name: ca
    kind: ClusterIssuer
  # Store the certificate in the following secret
  # This secret will be created automatically by cert-manager
  secretName: certificate
